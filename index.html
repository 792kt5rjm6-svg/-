<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>弓道 的中簿</title>

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#ffffff">

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --blue:#2563eb;
      --red:#dc2626;
      --green:#16a34a;
      --shadow:0 6px 18px rgba(0,0,0,.08);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      background:var(--bg);
      color:var(--text);
    }
    .app{min-height:100svh;display:flex;flex-direction:column}

    .topbar{
      position:sticky;top:0;z-index:20;
      background:var(--card);
      border-bottom:1px solid var(--line);
      padding:12px 14px;
      display:flex;align-items:center;gap:10px;
    }
    .burger{
      width:40px;height:40px;border-radius:12px;
      border:1px solid var(--line);
      display:grid;place-items:center;
      background:#fff;cursor:pointer;user-select:none;font-size:20px;
    }
    .title{
      font-weight:950;font-size:18px;flex:1;text-align:center;
      transform:translateX(-20px);
    }
    .top-actions{width:40px}

    .drawer-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.35);
      z-index:40;display:none;
    }
    .drawer{
      position:fixed;top:0;left:0;bottom:0;
      width:min(320px,86vw);
      background:var(--card);
      box-shadow:var(--shadow);
      z-index:50;
      transform:translateX(-105%);
      transition:.2s ease;
      padding:12px;
      display:flex;flex-direction:column;gap:8px;
    }
    .drawer.open{transform:translateX(0)}
    .drawer-overlay.open{display:block}
    .drawer-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:8px 8px 12px 8px;border-bottom:1px solid var(--line);
    }
    .drawer-close{
      width:36px;height:36px;border-radius:10px;
      border:1px solid var(--line);background:#fff;cursor:pointer;
    }
    .menu{padding:8px 6px;display:flex;flex-direction:column;gap:6px}
    .menu button{
      display:flex;align-items:center;gap:10px;
      padding:12px;border-radius:14px;
      border:1px solid var(--line);
      background:#fff;cursor:pointer;text-align:left;
      font-size:15px;font-weight:900;
    }
    .menu button.active{
      border-color:rgba(37,99,235,.35);
      box-shadow:0 0 0 3px rgba(37,99,235,.12);
    }
    .menu .hint{
      color:var(--muted);font-size:12px;line-height:1.45;
      padding:0 6px;margin-top:8px;
    }

    main{
      padding:14px;
      max-width:820px;
      width:100%;
      margin:0 auto;
      display:flex;flex-direction:column;gap:12px;
      padding-bottom:125px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:0 2px 10px rgba(0,0,0,.04);
      padding:12px;
    }
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .row > *{flex:1}
    .label{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:850}
    .muted{color:var(--muted)}
    .divider{height:1px;background:var(--line);margin:8px 0}

    input[type="text"], input[type="date"], textarea{
      width:100%;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      font-size:15px;
      outline:none;
    }
    textarea{min-height:90px;resize:vertical}
    .big-memo{min-height:260px}

    button{touch-action:manipulation}
    .btn{
      border:1px solid var(--line);
      background:#fff;
      border-radius:12px;
      padding:9px 10px;
      cursor:pointer;
      font-weight:950;
      font-size:13px;
      user-select:none;
      white-space:nowrap;
    }
    .btn.primary{
      border-color:rgba(37,99,235,.35);
      background:rgba(37,99,235,.08);
      color:var(--blue);
    }
    .btn.danger{
      border-color:rgba(220,38,38,.35);
      background:rgba(220,38,38,.06);
      color:var(--red);
    }
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      padding:10px 12px;border-radius:999px;
      background:#eef2ff;border:1px solid rgba(37,99,235,.25);
      color:var(--blue);font-weight:950;
      width:max-content;
    }

    .stand-head{
      display:flex;align-items:center;justify-content:space-between;
      gap:10px;margin-bottom:8px;
    }
    .stand-title{font-weight:950;font-size:16px}
    .stand-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

    .shots{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
    }
    .shot{
      height:64px;
      border-radius:18px;
      border:1px solid var(--line);
      background:#fff;
      display:grid;place-items:center;
      font-size:28px;font-weight:950;
      cursor:pointer;position:relative;
      user-select:none;touch-action:manipulation;
    }
    .shot.empty{color:#9ca3af}
    .shot.hit{color:var(--blue)}
    .shot.miss{color:var(--red)}
    .shot .sub{
      position:absolute;bottom:8px;right:10px;
      font-size:12px;font-weight:950;color:var(--muted);
    }

    .bottomnav{
      position:fixed;left:0;right:0;bottom:0;
      z-index:25;background:var(--card);
      border-top:1px solid var(--line);
      padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    }
    .bottomnav .tabs{
      max-width:820px;margin:0 auto;
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:8px;
    }
    .tab{
      display:flex;flex-direction:column;gap:4px;
      align-items:center;justify-content:center;
      padding:10px 6px;border-radius:14px;
      border:1px solid var(--line);
      background:#fff;cursor:pointer;
      user-select:none;font-weight:950;font-size:11px;
      text-align:center;
    }
    .tab.active{
      border-color:rgba(37,99,235,.35);
      box-shadow:0 0 0 3px rgba(37,99,235,.12);
    }
    .tab .ico{font-size:18px}

    .cal-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .cal-head .month{font-weight:950;font-size:16px}
    .cal-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:8px;margin-top:10px;
    }
    .cal-dow{
      font-size:12px;color:var(--muted);text-align:center;
      padding:2px 0;font-weight:950;
    }
    .cal-cell{
      aspect-ratio:1/1;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:8px;
      display:flex;flex-direction:column;justify-content:space-between;
      cursor:pointer;user-select:none;position:relative;
    }
    .cal-cell.off{background:#f9fafb;color:#9ca3af;cursor:default}
    .cal-cell.today{
      border-color:rgba(37,99,235,.45);
      box-shadow:0 0 0 3px rgba(37,99,235,.12);
    }
    .cal-cell .d{font-weight:950;font-size:14px}
    .cal-cell .dot{
      width:10px;height:10px;border-radius:999px;
      background:var(--green);
      align-self:flex-end;display:none;
    }
    .cal-cell.hasdata .dot{display:block}
    .cal-cell .mini{
      font-size:11px;color:var(--muted);font-weight:950;
      line-height:1.1;text-align:right;
    }

    .seg{display:flex;gap:8px;flex-wrap:wrap}
    .seg button{
      flex:1;min-width:100px;
      padding:10px;border-radius:999px;
      border:1px solid var(--line);
      background:#fff;cursor:pointer;font-weight:950;
    }
    .seg button.active{
      background:rgba(37,99,235,.08);
      border-color:rgba(37,99,235,.35);
      color:var(--blue);
      box-shadow:0 0 0 3px rgba(37,99,235,.12);
    }
    .stats-grid{display:grid;grid-template-columns:1fr;gap:10px}
    .statline{
      display:flex;align-items:baseline;justify-content:space-between;
      padding:10px;border:1px solid var(--line);
      border-radius:14px;background:#fff;
    }
    .statline .k{font-weight:950}
    .statline .v{
      font-weight:950;color:var(--blue);
      display:flex;gap:10px;align-items:baseline;
    }
    .statline .v small{color:var(--muted);font-weight:950}
    canvas{
      width:100%;height:240px;
      border:1px solid var(--line);
      border-radius:14px;background:#fff;
    }

    .eight{display:grid;gap:10px}
    .eight .item{
      border:1px solid var(--line);
      border-radius:14px;background:#fff;padding:10px;
    }
    .eight .item .name{font-weight:950;margin-bottom:6px}

    .toast{
      position:fixed;left:50%;bottom:108px;
      transform:translateX(-50%);
      background:#111827;color:#fff;
      padding:10px 12px;border-radius:999px;
      font-weight:950;opacity:0;pointer-events:none;
      transition:.2s ease;z-index:80;
      box-shadow:var(--shadow);font-size:13px;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

    .overlay{
      position:fixed;inset:0;background:var(--bg);
      z-index:100;display:none;flex-direction:column;overflow:auto;
    }
    .overlay.open{display:flex}
    .ov-top{
      position:sticky;top:0;background:var(--card);
      border-bottom:1px solid var(--line);
      padding:12px 14px;
      display:flex;align-items:center;gap:10px;z-index:110;
    }
    .ov-title{
      font-weight:950;flex:1;text-align:center;
      transform:translateX(-20px);
    }
    .ov-body{
      padding:14px;
      max-width:820px;width:100%;
      margin:0 auto;
      display:flex;flex-direction:column;gap:12px;
      padding-bottom:140px;
    }

    .target-wrap{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:0 2px 10px rgba(0,0,0,.04);
      padding:12px;
    }
    .target-stage{
      width:100%;aspect-ratio:1/1;
      border-radius:18px;border:1px solid var(--line);
      background:#fff;position:relative;overflow:hidden;
      touch-action:none;display:grid;place-items:center;
    }
    .target-svg{
      width:86%;height:86%;
      max-width:520px;max-height:520px;
      pointer-events:none;
    }
    .marker{
      width:56px;height:56px;border-radius:999px;
      position:absolute;display:grid;place-items:center;
      font-weight:950;color:#fff;
      box-shadow:0 10px 18px rgba(0,0,0,.18);
      border:3px solid rgba(255,255,255,.95);
      cursor:grab;user-select:none;touch-action:none;
    }
    .marker:active{cursor:grabbing}
    .m1{background:rgba(248,113,113,.95)}
    .m2{background:rgba(34,197,94,.95)}
    .m3{background:rgba(59,130,246,.95)}
    .m4{background:rgba(234,179,8,.95);color:#111827;border-color:rgba(255,255,255,.9)}
    .ov-hint{font-size:12px;color:var(--muted);line-height:1.5}
    .shot-select{display:flex;gap:8px;flex-wrap:wrap}
    .shot-select button{
      flex:1;min-width:80px;padding:10px;
      border-radius:999px;border:1px solid var(--line);
      background:#fff;cursor:pointer;font-weight:950;
    }
    .shot-select button.active{
      background:rgba(37,99,235,.08);
      border-color:rgba(37,99,235,.35);
      color:var(--blue);
      box-shadow:0 0 0 3px rgba(37,99,235,.12);
    }

    .amarker{
      width:22px;height:22px;border-radius:999px;
      position:absolute;display:grid;place-items:center;
      font-weight:950;font-size:12px;color:#fff;
      border:2px solid rgba(255,255,255,.95);
      box-shadow:0 8px 16px rgba(0,0,0,.14);
      transform:translate(-50%,-50%);
      pointer-events:none;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="burger" id="burger" aria-label="menu">≡</div>
    <div class="title" id="pageTitle">的中入力</div>
    <div class="top-actions"></div>
  </div>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="h">メニュー</div>
      <button class="drawer-close" id="drawerClose">×</button>
    </div>
    <div class="menu">
      <button id="m-record" class="active">🎯 的中入力</button>
      <button id="m-calendar">🗓️ 日付</button>
      <button id="m-stats">📒 的中率</button>
      <button id="m-form">🏹 射型</button>
      <button id="m-reflection">📝 反省</button>
      <button id="m-goal">🎯 目標</button>
      <div class="hint">
        ・ワンタップ：青 ○（的中）<br>
        ・ダブルタップ：赤 ×（外れ）<br>
        ・長押し：クリア（未入力）
      </div>
    </div>
  </aside>

  <main id="main"></main>

  <div class="bottomnav">
    <div class="tabs">
      <div class="tab active" id="t-record"><div class="ico">🎯</div>的中</div>
      <div class="tab" id="t-calendar"><div class="ico">🗓️</div>日付</div>
      <div class="tab" id="t-stats"><div class="ico">📒</div>的中率</div>
      <div class="tab" id="t-form"><div class="ico">🏹</div>射型</div>
      <div class="tab" id="t-reflection"><div class="ico">📝</div>反省</div>
      <div class="tab" id="t-goal"><div class="ico">🎯</div>目標</div>
    </div>
  </div>

  <div class="toast" id="toast">保存しました</div>
</div>

<div class="overlay" id="locEditor">
  <div class="ov-top">
    <button class="btn" id="locBack">←</button>
    <div class="ov-title" id="locTitle">矢所</div>
    <div style="width:40px"></div>
  </div>
  <div class="ov-body">
    <div class="card">
      <div class="label">編集する矢（1〜4射目）</div>
      <div class="shot-select" id="shotSelect"></div>
      <div class="divider"></div>
      <div class="ov-hint">
        ・丸い番号（①〜④）をドラッグして配置<br>
        ・的をタップすると「選択中の矢」をその位置に移動<br>
        ・保存は自動（戻るだけでOK）
      </div>
    </div>

    <div class="target-wrap">
      <div class="label">矢所（的の上に配置）</div>
      <div class="target-stage" id="stage">
        <svg class="target-svg" viewBox="0 0 100 100" aria-hidden="true">
          <circle cx="50" cy="50" r="45" fill="none" stroke="#000" stroke-width="6"/>
          <circle cx="50" cy="50" r="32" fill="none" stroke="#000" stroke-width="6"/>
          <circle cx="50" cy="50" r="18" fill="none" stroke="#000" stroke-width="6"/>
          <circle cx="50" cy="50" r="7" fill="none" stroke="#000" stroke-width="6"/>
        </svg>
      </div>
      <div class="divider"></div>
      <div class="row">
        <button class="btn" id="clearThisShot">選択中の矢をクリア</button>
        <button class="btn danger" id="clearAllShots">この立ちの矢所を全クリア</button>
      </div>
    </div>
  </div>
</div>

<script>
const STORE_KEY = "kyudo_notebook_v5";
const FORM_KEY  = "kyudo_form_v2";

function loadAll(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch(e){ return {}; }
}
function saveAll(obj){
  localStorage.setItem(STORE_KEY, JSON.stringify(obj));
}
function defaultStand(){
  return { shots:[0,0,0,0], locs:[null,null,null,null], memo:"" };
}
function defaultDay(){
  return {
    goal:"",
    reflection:"",
    nextGoal:"",
    stands:Array.from({length:4}, ()=>defaultStand())
  };
}
function getDay(all, key){
  if(!all[key]) all[key] = defaultDay();
  if(!all[key].stands || all[key].stands.length===0) all[key].stands = defaultDay().stands;

  all[key].goal = typeof all[key].goal === "string" ? all[key].goal : "";
  all[key].reflection = typeof all[key].reflection === "string" ? all[key].reflection : "";
  all[key].nextGoal = typeof all[key].nextGoal === "string" ? all[key].nextGoal : "";

  all[key].stands = all[key].stands.map(s=>{
    const shots = Array.isArray(s?.shots) && s.shots.length===4 ? s.shots : [0,0,0,0];
    let locs = Array.isArray(s?.locs) && s.locs.length===4 ? s.locs : [null,null,null,null];
    locs = locs.map(v=>{
      if(v==null) return null;
      if(typeof v === "number") return null;
      if(typeof v === "object" && typeof v.x === "number" && typeof v.y === "number") return v;
      return null;
    });
    const memo = typeof s?.memo === "string" ? s.memo : "";
    return { shots, locs, memo };
  });

  return all[key];
}

function defaultForm(){
  return {
    focus:"",
    eight:{
      "足踏み":"",
      "胴造り":"",
      "弓構え":"",
      "打起し":"",
      "大三":"",
      "引分け":"",
      "会":"",
      "離れ":"",
      "残心":""
    }
  };
}
function loadForm(){
  try{
    const raw = localStorage.getItem(FORM_KEY);
    return raw ? JSON.parse(raw) : defaultForm();
  }catch(e){ return defaultForm(); }
}
function saveForm(obj){ localStorage.setItem(FORM_KEY, JSON.stringify(obj)); }

function todayKey(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}
function clamp01(v){ return Math.max(0.02, Math.min(0.98, v)); }
function pct(h,t){ return t ? (h/t*100) : 0; }

const main = document.getElementById("main");
const pageTitle = document.getElementById("pageTitle");

const Pages = {
  record:"record",
  calendar:"calendar",
  stats:"stats",
  form:"form",
  reflection:"reflection",
  goal:"goal"
};
let currentPage = Pages.record;
let currentRecordKey = todayKey();

function setActiveTabs(){
  const allTabs = ["t-record","t-calendar","t-stats","t-form","t-reflection","t-goal"];
  const allMenu = ["m-record","m-calendar","m-stats","m-form","m-reflection","m-goal"];
  allTabs.forEach(id=>document.getElementById(id).classList.remove("active"));
  allMenu.forEach(id=>document.getElementById(id).classList.remove("active"));

  const map = {
    record:["t-record","m-record"],
    calendar:["t-calendar","m-calendar"],
    stats:["t-stats","m-stats"],
    form:["t-form","m-form"],
    reflection:["t-reflection","m-reflection"],
    goal:["t-goal","m-goal"]
  };
  map[currentPage].forEach(id=>document.getElementById(id).classList.add("active"));
}
function navigate(page){
  currentPage = page;
  closeDrawer();
  setActiveTabs();

  if(page===Pages.record){
    pageTitle.textContent = "的中入力";
    renderRecord();
  }else if(page===Pages.calendar){
    pageTitle.textContent = "日付";
    renderCalendar();
  }else if(page===Pages.stats){
    pageTitle.textContent = "的中率";
    renderStats();
  }else if(page===Pages.form){
    pageTitle.textContent = "射型";
    renderForm();
  }else if(page===Pages.reflection){
    pageTitle.textContent = "反省";
    renderReflection();
  }else if(page===Pages.goal){
    pageTitle.textContent = "目標";
    renderGoal();
  }
}

const drawer = document.getElementById("drawer");
const drawerOverlay = document.getElementById("drawerOverlay");
function openDrawer(){ drawer.classList.add("open"); drawerOverlay.classList.add("open"); }
function closeDrawer(){ drawer.classList.remove("open"); drawerOverlay.classList.remove("open"); }

document.getElementById("burger").addEventListener("click", openDrawer);
document.getElementById("drawerClose").addEventListener("click", closeDrawer);
drawerOverlay.addEventListener("click", closeDrawer);

document.getElementById("m-record").addEventListener("click", ()=>navigate(Pages.record));
document.getElementById("m-calendar").addEventListener("click", ()=>navigate(Pages.calendar));
document.getElementById("m-stats").addEventListener("click", ()=>navigate(Pages.stats));
document.getElementById("m-form").addEventListener("click", ()=>navigate(Pages.form));
document.getElementById("m-reflection").addEventListener("click", ()=>navigate(Pages.reflection));
document.getElementById("m-goal").addEventListener("click", ()=>navigate(Pages.goal));

document.getElementById("t-record").addEventListener("click", ()=>navigate(Pages.record));
document.getElementById("t-calendar").addEventListener("click", ()=>navigate(Pages.calendar));
document.getElementById("t-stats").addEventListener("click", ()=>navigate(Pages.stats));
document.getElementById("t-form").addEventListener("click", ()=>navigate(Pages.form));
document.getElementById("t-reflection").addEventListener("click", ()=>navigate(Pages.reflection));
document.getElementById("t-goal").addEventListener("click", ()=>navigate(Pages.goal));

const toast = document.getElementById("toast");
let toastTimer = null;
function showToast(msg="保存しました"){
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toast.classList.remove("show"), 1100);
}

function attachTapHandlers(el, { onTap, onDoubleTap, onLongPress }) {
  let tapTimeout = null;
  let lastTap = 0;
  let pressTimer = null;
  let moved = false;
  let ignoreClickUntil = 0;

  const clearTimers = () => {
    if (tapTimeout) { clearTimeout(tapTimeout); tapTimeout = null; }
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  };

  el.addEventListener("touchstart", () => {
    moved = false;
    ignoreClickUntil = Date.now() + 800;
    pressTimer = setTimeout(() => {
      onLongPress?.();
      clearTimers();
    }, 520);
  }, { passive: true });

  el.addEventListener("touchmove", () => {
    moved = true;
    clearTimers();
  }, { passive: true });

  el.addEventListener("touchend", () => {
    if (moved) return;
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }

    const now = Date.now();
    const delta = now - lastTap;
    lastTap = now;

    if (delta > 0 && delta < 260) {
      if (tapTimeout) { clearTimeout(tapTimeout); tapTimeout = null; }
      onDoubleTap?.();
    } else {
      tapTimeout = setTimeout(() => {
        onTap?.();
        tapTimeout = null;
      }, 260);
    }
  }, { passive: true });

  el.addEventListener("click", (e) => {
    if (Date.now() < ignoreClickUntil) return;
    onTap?.(e);
  });
  el.addEventListener("dblclick", (e) => {
    if (Date.now() < ignoreClickUntil) return;
    onDoubleTap?.(e);
  });
  el.addEventListener("contextmenu", (e) => {
    e.preventDefault();
    onLongPress?.(e);
  });
}

function daySummary(day){
  let total=0, hit=0;
  day.stands.forEach(s=>{
    s.shots.forEach(st=>{
      if(st!==0){
        total++;
        if(st===1) hit++;
      }
    });
  });
  const p = total ? (hit/total*100) : 0;
  return {total, hit, pct:p};
}
function dayHasAnyInput(day){
  return day.stands.some(s=>s.shots.some(st=>st!==0));
}
function hasLoc(stand, idx){
  const v = stand.locs[idx];
  return !!(v && typeof v.x==="number" && typeof v.y==="number");
}
function shotSymbol(state){ return state===1 ? "○" : state===2 ? "×" : "＋"; }
function shotClass(state){ return state===1 ? "shot hit" : state===2 ? "shot miss" : "shot empty"; }

  };

    calYear = t.getFullYear();
    calMonth = t.getMonth();
    renderCalendar();
  };

  const dow = ["日","月","火","水","木","金","土"];
  dow.forEach(d=>grid.insertAdjacentHTML("beforeend", `<div class="cal-dow">${d}</div>`));

  const first = new Date(calYear, calMonth, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  const prevMonthDays = new Date(calYear, calMonth, 0).getDate();
  for(let i=0;i<startDow;i++){
    const d = prevMonthDays - (startDow-1-i);
    grid.insertAdjacentHTML("beforeend", `<div class="cal-cell off"><div class="d">${d}</div><div class="mini"></div><div class="dot"></div></div>`);
  }

  const tKey = todayKey();
  for(let d=1; d<=daysInMonth; d++){
    const key = `${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const day = all[key] ? getDay(all, key) : null;

    const cls = ["cal-cell", has ? "hasdata" : "", key===tKey ? "today" : ""].join(" ").trim();

      <div class="${cls}" data-cal="${key}">
        <div class="d">${d}</div>
        <div class="mini">${mini}</div>
        <div class="dot"></div>
      </div>
    `);
  }

  const totalCells = 7 + startDow + daysInMonth;
  const remainder = totalCells % 7;
  const fill = remainder===0 ? 0 : (7 - remainder);
  for(let i=1;i<=fill;i++){
    grid.insertAdjacentHTML("beforeend", `<div class="cal-cell off"><div class="d">${i}</div><div class="mini"></div><div class="dot"></div></div>`);
  }

  document.querySelectorAll("[data-cal]").forEach(cell=>{
    cell.addEventListener("click", ()=>{
      const key = cell.dataset.cal;
      currentRecordKey = key;
      navigate(Pages.record);
      renderRecord(key);
    });
  });
}

function filterDaysByMode(all, mode, year, month){
  const entries = Object.entries(all).map(([key])=>({key, day:getDay(all,key)}));
  if(mode==="all"){
    return {days: entries, label:"総合（全期間）", hint:`${entries.length}日分`};
  }
  if(mode==="year"){
    const prefix = `${year}-`;
    const ds = entries.filter(e=>e.key.startsWith(prefix));
    return {days: ds, label:`年間（${year}年）`, hint:`${ds.length}日分`};
  }
  const mm = String(month).padStart(2,"0");
  const prefix = `${year}-${mm}-`;
  const ds = entries.filter(e=>e.key.startsWith(prefix));
  return {days: ds, label:`月間（${year}/${mm}）`, hint:`${ds.length}日分`};
}
function aggregate(days){
  let total=0, hit=0;
  const per = [{total:0,hit:0},{total:0,hit:0},{total:0,hit:0},{total:0,hit:0}];
  days.forEach(({day})=>{
    day.stands.forEach(s=>{
      s.shots.forEach((st,i)=>{
        if(st!==0){
          total++;
          per[i].total++;
          if(st===1){
            hit++;
            per[i].hit++;
          }
        }
      });
    });
  });
  return {total, hit, per};
}

function drawBarChart(canvas, points){
  const ctx = canvas.getContext("2d");
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.floor(rect.width * dpr);
  canvas.height = Math.floor(rect.height * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);

  const w = rect.width, h = rect.height;
  ctx.clearRect(0,0,w,h);

  const pad = {l:36, r:12, t:12, b:30};
  const innerW = w - pad.l - pad.r;
  const innerH = h - pad.t - pad.b;
  const maxVal = Math.max(1, ...points.map(p=>Math.max(p.total, p.hit)));

  ctx.strokeStyle = "#e5e7eb";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad.l, pad.t);
  ctx.lineTo(pad.l, pad.t + innerH);
  ctx.lineTo(pad.l + innerW, pad.t + innerH);
  ctx.stroke();

  ctx.fillStyle = "#6b7280";
  ctx.font = "12px system-ui";
  ctx.fillText(String(maxVal), 8, pad.t + 10);
  ctx.fillText("0", 16, pad.t + innerH + 4);

  const n = Math.max(1, points.length);
  const gap = 6;
  const groupW = innerW / n;
  const barW = Math.max(6, (groupW - gap) / 2);

  points.forEach((p,i)=>{
    const x0 = pad.l + i*groupW + gap/2;
    const yBase = pad.t + innerH;
    const ht = innerH * (p.hit / maxVal);
    const tt = innerH * (p.total / maxVal);

    ctx.fillStyle = "rgba(37,99,235,.85)";
    ctx.fillRect(x0, yBase - ht, barW, ht);

    ctx.fillStyle = "rgba(220,38,38,.75)";
    ctx.fillRect(x0 + barW + 3, yBase - tt, barW, tt);
  });
}
function drawLineChart(canvas, points){
  const ctx = canvas.getContext("2d");
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.floor(rect.width * dpr);
  canvas.height = Math.floor(rect.height * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);

  const w = rect.width, h = rect.height;
  ctx.clearRect(0,0,w,h);

  const pad = {l:36, r:12, t:12, b:30};
  const innerW = w - pad.l - pad.r;
  const innerH = h - pad.t - pad.b;

  ctx.strokeStyle = "#e5e7eb";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad.l, pad.t);
  ctx.lineTo(pad.l, pad.t + innerH);
  ctx.lineTo(pad.l + innerW, pad.t + innerH);
  ctx.stroke();

  ctx.fillStyle = "#6b7280";
  ctx.font = "12px system-ui";
  ctx.fillText("100", 6, pad.t + 10);
  ctx.fillText("0", 16, pad.t + innerH + 4);

  const valid = points.map(p=>p.value).filter(v=>typeof v==="number");
  if(valid.length===0){
    ctx.fillStyle = "#6b7280";
    ctx.font = "13px system-ui";
    ctx.fillText("データがありません", pad.l, pad.t + innerH/2);
    return;
  }

  const n = Math.max(1, points.length);
  const stepX = innerW / Math.max(1, n-1);

  ctx.strokeStyle = "rgba(37,99,235,.9)";
  ctx.lineWidth = 2;
  ctx.beginPath();

  let started = false;
  points.forEach((p,i)=>{
    if(typeof p.value !== "number") return;
    const x = pad.l + i*stepX;
    const y = pad.t + innerH * (1 - (p.value/100));
    if(!started){
      ctx.moveTo(x,y);
      started = true;
    }else{
      ctx.lineTo(x,y);
    }
  });
  ctx.stroke();

  ctx.fillStyle = "rgba(37,99,235,.95)";
  points.forEach((p,i)=>{
    if(typeof p.value !== "number") return;
    const x = pad.l + i*stepX;
    const y = pad.t + innerH * (1 - (p.value/100));
    ctx.beginPath();
    ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fill();
  });
}
function renderYadokoroAnalysis(days){
  const stage = document.getElementById("analysisStage");
  const text = document.getElementById("analysisText");
  if(!stage || !text) return;

  const sums = [
    {n:0, sx:0, sy:0},
    {n:0, sx:0, sy:0},
    {n:0, sx:0, sy:0},
    {n:0, sx:0, sy:0},
  ];

  days.forEach(({day})=>{
    day.stands.forEach(s=>{
      for(let i=0;i<4;i++){
        const v = s.locs[i];
        if(v && typeof v.x==="number" && typeof v.y==="number"){
          sums[i].n++;
          sums[i].sx += v.x;
          sums[i].sy += v.y;
        }
      }
    });
  });

  stage.querySelectorAll(".amarker").forEach(el=>el.remove());

  const rect = stage.getBoundingClientRect();
  const w = rect.width, h = rect.height;
  const colors = [
    "rgba(248,113,113,.95)",
    "rgba(34,197,94,.95)",
    "rgba(59,130,246,.95)",
    "rgba(234,179,8,.95)"
  ];
  const textColors = ["#fff","#fff","#fff","#111827"];

  const lines = [];
  for(let i=0;i<4;i++){
    if(sums[i].n===0){
      lines.push(`${i+1}射目：データなし`);
      continue;
    }
    const ax = sums[i].sx / sums[i].n;
    const ay = sums[i].sy / sums[i].n;

    const m = document.createElement("div");
    m.className = "amarker";
    m.textContent = String(i+1);
    m.style.background = colors[i];
    m.style.color = textColors[i];
    m.style.left = `${ax*w}px`;
    m.style.top = `${ay*h}px`;
    stage.appendChild(m);

    lines.push(`${i+1}射目：${sums[i].n}件`);
  }
  text.textContent = lines.join(" / ");
}

function renderForm(){
  const form = loadForm();
  const keys = ["足踏み","胴造り","弓構え","打起し","大三","引分け","会","離れ","残心"];
  if(!form.eight) form.eight = {};
  if(form.eight["大三"] === undefined) form.eight["大三"] = "";

  main.innerHTML = `
    <div class="card">
      <div class="label">射型（全体）で意識すべきこと</div>
      <textarea id="formFocus" placeholder="例：会で伸び続ける / 押しの方向を真っ直ぐ">${escapeHtml(form.focus)}</textarea>
    </div>

    <div class="card">
      <div class="label">射法（足踏み〜残心）メモ</div>
      <div class="eight">
        ${keys.map(k=>`
          <div class="item">
            <div class="name">${k}</div>
            <textarea data-eight="${k}" placeholder="例：大三で肘の高さを安定">${escapeHtml(form.eight[k]||"")}</textarea>
          </div>
        `).join("")}
      </div>
    </div>

    <div class="card">
      <div style="text-align:right">
        <button class="btn danger" id="resetForm">射型メモを初期化</button>
      </div>
    </div>
  `;

  document.getElementById("formFocus").addEventListener("input", (e)=>{
    const f = loadForm();
    f.focus = e.target.value;
    saveForm(f);
  });

  document.querySelectorAll("[data-eight]").forEach(t=>{
    t.addEventListener("input", ()=>{
      const k = t.dataset.eight;
      const f = loadForm();
      if(!f.eight) f.eight = {};
      f.eight[k] = t.value;
      saveForm(f);
    });
  });

  document.getElementById("resetForm").addEventListener("click", ()=>{
    if(!confirm("射型メモを初期化します。OK？")) return;
    saveForm(defaultForm());
    showToast("初期化しました");
    renderForm();
  });
}

const locEditor = document.getElementById("locEditor");
const locBack = document.getElementById("locBack");
const locTitle = document.getElementById("locTitle");
const stage = document.getElementById("stage");
const shotSelect = document.getElementById("shotSelect");
const clearThisShotBtn = document.getElementById("clearThisShot");
const clearAllShotsBtn = document.getElementById("clearAllShots");

let locCtx = null;
let selectedShot = 0;
let markers = [];

function openLocEditor({dateKey, standIdx, initialShot}){
  locCtx = {dateKey, standIdx};
  selectedShot = initialShot ?? 0;

  const all = loadAll();
  const day = getDay(all, dateKey);
  const stand = day.stands[standIdx];

  locTitle.textContent = `矢所（${standIdx+1}立ち目）`;
  locEditor.classList.add("open");

  shotSelect.innerHTML = "";
  for(let i=0;i<4;i++){
    const b = document.createElement("button");
    b.textContent = `${i+1}射目`;
    b.className = i===selectedShot ? "active" : "";
    b.onclick = ()=>{
      selectedShot = i;
      refreshShotSelect();
    };
    shotSelect.appendChild(b);
  }

  markers.forEach(m=>m.remove());
  markers = [];
  for(let i=0;i<4;i++){
    const m = document.createElement("div");
    m.className = `marker m${i+1}`;
    m.textContent = String(i+1);
    m.dataset.idx = String(i);

    const pos = stand.locs[i];
    const fallback = defaultMarkerPos(i);
    const p = (pos && typeof pos.x==="number") ? pos : fallback;
    setMarkerNormalized(m, p.x, p.y);

    attachDrag(m);
    stage.appendChild(m);
    markers.push(m);
  }
}

function closeLocEditor(){
  locEditor.classList.remove("open");
  locCtx = null;
}
locBack.addEventListener("click", ()=>{
  closeLocEditor();
  if(currentPage===Pages.record) renderRecord(currentRecordKey);
});
function refreshShotSelect(){
  [...shotSelect.querySelectorAll("button")].forEach((b,i)=>{
    b.classList.toggle("active", i===selectedShot);
  });
}
stage.addEventListener("pointerdown", (e)=>{
  const target = e.target;
  if(target.classList && target.classList.contains("marker")) return;
  if(!locCtx) return;

  const rect = stage.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;

  const m = markers[selectedShot];
  setMarkerNormalized(m, clamp01(x), clamp01(y));
  saveMarker(selectedShot, clamp01(x), clamp01(y));
});
function defaultMarkerPos(i){
  const xs = [0.18, 0.38, 0.62, 0.82];
  return {x: xs[i], y: 0.85};
}
function setMarkerNormalized(el, nx, ny){
  const rect = stage.getBoundingClientRect();
  const px = nx * rect.width;
  const py = ny * rect.height;
  el.style.left = `${px}px`;
  el.style.top = `${py}px`;
  el.style.transform = "translate(-50%, -50%)";
}
function saveMarker(shotIdx, nx, ny){
  if(!locCtx) return;
  const all = loadAll();
  const day = getDay(all, locCtx.dateKey);
  const stand = day.stands[locCtx.standIdx];
  stand.locs[shotIdx] = {x:nx, y:ny};
  saveAll(all);
}
function clearMarker(shotIdx){
  if(!locCtx) return;
  const all = loadAll();
  const day = getDay(all, locCtx.dateKey);
  const stand = day.stands[locCtx.standIdx];
  stand.locs[shotIdx] = null;
  saveAll(all);

  const m = markers[shotIdx];
  const p = defaultMarkerPos(shotIdx);
  setMarkerNormalized(m, p.x, p.y);
}
function clearAllMarkers(){
  for(let i=0;i<4;i++) clearMarker(i);
}
clearThisShotBtn.addEventListener("click", ()=>{
  clearMarker(selectedShot);
  showToast("この矢をクリア");
});
clearAllShotsBtn.addEventListener("click", ()=>{
  if(!confirm("この立ちの矢所を全てクリアします。OK？")) return;
  clearAllMarkers();
  showToast("全クリア");
});
function attachDrag(marker){
  let dragging = false;
  const idx = Number(marker.dataset.idx);

  marker.addEventListener("pointerdown", (e)=>{
    e.preventDefault();
    e.stopPropagation();
    dragging = true;
    selectedShot = idx;
    refreshShotSelect();
    marker.setPointerCapture(e.pointerId);
  });

  marker.addEventListener("pointermove", (e)=>{
    if(!dragging) return;
    const rect = stage.getBoundingClientRect();
    const nx = clamp01((e.clientX - rect.left) / rect.width);
    const ny = clamp01((e.clientY - rect.top) / rect.height);
    setMarkerNormalized(marker, nx, ny);
    saveMarker(idx, nx, ny);
  });

  marker.addEventListener("pointerup", ()=>{ dragging = false; });
  marker.addEventListener("pointercancel", ()=>{ dragging = false; });
}

navigate(Pages.record);

window.addEventListener("resize", ()=>{
  if(locEditor.classList.contains("open") && locCtx){
    const all = loadAll();
    const day = getDay(all, locCtx.dateKey);
    const stand = day.stands[locCtx.standIdx];
    markers.forEach((m,i)=>{
      const pos = stand.locs[i] || defaultMarkerPos(i);
      setMarkerNormalized(m, pos.x, pos.y);
    });
  }
  if(currentPage===Pages.stats) renderStats();
});

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js").catch(()=>{});
}
</script>
