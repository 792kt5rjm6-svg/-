<!doctype html>
<html lang="ja">
<head>
  <link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#ffffff">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>弓道 的中簿</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --blue:#2563eb;
      --red:#dc2626;
      --shadow:0 6px 18px rgba(0,0,0,.08);
      --radius:16px;
      --green:#16a34a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji";
      background:var(--bg);
      color:var(--text);
    }
    .app{ min-height:100svh; display:flex; flex-direction:column; }

    /* Top bar */
    .topbar{
      position:sticky; top:0; z-index:20;
      background:var(--card);
      border-bottom:1px solid var(--line);
      padding:12px 14px;
      display:flex; align-items:center; gap:10px;
    }
    .burger{
      width:40px;height:40px;border-radius:12px;
      border:1px solid var(--line);
      display:grid;place-items:center;
      background:#fff; cursor:pointer; user-select:none; font-size:20px;
    }
    .title{
      font-weight:800; font-size:18px; flex:1; text-align:center;
      transform:translateX(-20px);
    }
    .top-actions{ width:40px; }

    /* Drawer */
    .drawer-overlay{
      position:fixed;inset:0;
      background:rgba(0,0,0,.35);
      z-index:40; display:none;
    }
    .drawer{
      position:fixed;top:0;left:0;bottom:0;
      width:min(320px,86vw);
      background:var(--card);
      box-shadow:var(--shadow);
      z-index:50;
      transform:translateX(-105%);
      transition:.2s ease;
      padding:12px;
      display:flex; flex-direction:column; gap:8px;
    }
    .drawer.open{transform:translateX(0)}
    .drawer-overlay.open{display:block}
    .drawer-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:8px 8px 12px 8px;
      border-bottom:1px solid var(--line);
    }
    .drawer-header .h{ font-weight:800; }
    .drawer-close{
      width:36px;height:36px;border-radius:10px;
      border:1px solid var(--line);
      background:#fff; cursor:pointer;
    }
    .menu{ padding:8px 6px; display:flex; flex-direction:column; gap:6px; }
    .menu button{
      display:flex;align-items:center;gap:10px;
      padding:12px 12px;border-radius:14px;
      border:1px solid var(--line);
      background:#fff; cursor:pointer;
      font-size:15px; text-align:left;
    }
    .menu button.active{
      border-color:rgba(37,99,235,.35);
      box-shadow:0 0 0 3px rgba(37,99,235,.12);
    }
    .menu .hint{
      color:var(--muted);
      font-size:12px;
      padding:0 6px;
      margin-top:8px;
      line-height:1.45;
    }

    /* Main */
    main{
      padding:14px;
      max-width:820px;
      width:100%;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:12px;
      padding-bottom:102px; /* bottom nav分 */
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:0 2px 10px rgba(0,0,0,.04);
      padding:12px;
    }
    .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .row > *{ flex:1 }
    .label{ font-size:12px; color:var(--muted); margin-bottom:6px; }
    input[type="text"], input[type="date"], textarea{
      width:100%;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      font-size:15px;
      outline:none;
    }
    textarea{ min-height:90px; resize:vertical; }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:10px 12px; border-radius:999px;
      background:#eef2ff; border:1px solid rgba(37,99,235,.25);
      font-weight:800; color:var(--blue);
      width:max-content;
    }
    .muted{ color:var(--muted); }
    .divider{ height:1px; background:var(--line); margin:8px 0; }

    /* Buttons */
    .btn{
      border:1px solid var(--line);
      background:#fff;
      border-radius:12px;
      padding:9px 10px;
      cursor:pointer;
      font-weight:800;
      font-size:13px;
      user-select:none;
      white-space:nowrap;
    }
    .btn.primary{
      border-color:rgba(37,99,235,.35);
      background:rgba(37,99,235,.08);
      color:var(--blue);
    }
    .btn.danger{
      border-color:rgba(220,38,38,.35);
      background:rgba(220,38,38,.06);
      color:var(--red);
    }

    /* Stands */
    .stand-head{
      display:flex;align-items:center;justify-content:space-between;
      gap:10px; margin-bottom:8px;
    }
    .stand-title{ font-weight:900; font-size:16px; }
    .stand-actions{ display:flex; gap:8px; align-items:center; }

    .shots{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
    }
    .shot{
      height:64px;
      border-radius:18px;
      border:1px solid var(--line);
      background:#fff;
      display:grid;
      place-items:center;
      font-size:28px;
      font-weight:900;
      cursor:pointer;
      position:relative;
      user-select:none;
      touch-action:manipulation;
    }
    .shot.empty{color:#9ca3af}
    .shot.hit{color:var(--blue)}
    .shot.miss{color:var(--red)}
    .shot .sub{
      position:absolute; bottom:8px; right:10px;
      font-size:12px; font-weight:900; color:var(--muted);
    }
    .shot.hit .sub{color:rgba(37,99,235,.9)}
    .shot.miss .sub{color:rgba(220,38,38,.9)}

    /* bottom nav */
    .bottomnav{
      position:fixed;left:0;right:0;bottom:0;
      z-index:25;
      background:var(--card);
      border-top:1px solid var(--line);
      padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    }
    .bottomnav .tabs{
      max-width:820px;margin:0 auto;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
    }
    .tab{
      display:flex;flex-direction:column;gap:4px;
      align-items:center;justify-content:center;
      padding:10px 8px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      user-select:none;
      font-weight:900;
      font-size:12px;
    }
    .tab.active{
      border-color:rgba(37,99,235,.35);
      box-shadow:0 0 0 3px rgba(37,99,235,.12);
    }
    .tab .ico{font-size:18px}

    /* Modal */
    .modal-overlay{
      position:fixed;inset:0;
      background:rgba(0,0,0,.35);
      z-index:60;
      display:none;
      align-items:center;justify-content:center;
      padding:14px;
    }
    .modal{
      width:min(520px,100%);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:14px;
    }
    .modal h3{margin:0 0 8px 0;font-size:16px}
    .modal .grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-top:10px;
    }
    .locbtn{
      height:58px;
      border-radius:16px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      font-weight:900;
      font-size:18px;
      user-select:none;
    }
    .locbtn:nth-child(1){background:rgba(248,113,113,.12)}
    .locbtn:nth-child(2){background:rgba(34,197,94,.12)}
    .locbtn:nth-child(3){background:rgba(59,130,246,.12)}
    .locbtn:nth-child(4){background:rgba(234,179,8,.12)}
    .modal .foot{ margin-top:12px; display:flex; justify-content:flex-end; gap:8px; }

    /* Stats */
    .seg{ display:flex; gap:8px; flex-wrap:wrap; }
    .seg button{
      flex:1; min-width:100px;
      padding:10px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      font-weight:900;
    }
    .seg button.active{
      background:rgba(37,99,235,.08);
      border-color:rgba(37,99,235,.35);
      color:var(--blue);
    }
    .stats-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }
    .statline{
      display:flex;align-items:baseline;justify-content:space-between;
      padding:10px 10px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
    }
    .statline .k{font-weight:900}
    .statline .v{
      font-weight:900;
      color:var(--blue);
      display:flex;gap:10px;align-items:baseline;
    }
    .statline .v small{color:var(--muted);font-weight:900}
    canvas{width:100%;height:220px;border:1px solid var(--line);border-radius:14px;background:#fff}

    /* Form page */
    .eight{ display:grid; gap:10px; }
    .eight .item{
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:10px;
    }
    .eight .item .name{ font-weight:900; margin-bottom:6px; }

    /* Calendar */
    .cal-head{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
    }
    .cal-head .month{
      font-weight:900;
      font-size:16px;
    }
    .cal-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:8px;
      margin-top:10px;
    }
    .cal-dow{
      font-size:12px;
      color:var(--muted);
      text-align:center;
      padding:2px 0;
      font-weight:800;
    }
    .cal-cell{
      aspect-ratio:1/1;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:8px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      cursor:pointer;
      user-select:none;
      position:relative;
    }
    .cal-cell.off{ background:#f9fafb; color:#9ca3af; cursor:default; }
    .cal-cell.today{ border-color:rgba(37,99,235,.45); box-shadow:0 0 0 3px rgba(37,99,235,.12); }
    .cal-cell .d{ font-weight:900; font-size:14px; }
    .cal-cell .dot{
      width:10px;height:10px;border-radius:999px;
      background:var(--green);
      align-self:flex-end;
      display:none;
    }
    .cal-cell.hasdata .dot{ display:block; }
    .cal-cell .mini{
      font-size:11px;
      color:var(--muted);
      font-weight:800;
      line-height:1.1;
      text-align:right;
    }

    .toast{
      position:fixed;left:50%;bottom:108px;
      transform:translateX(-50%);
      background:#111827;color:#fff;
      padding:10px 12px;border-radius:999px;
      font-weight:900;
      opacity:0;pointer-events:none;
      transition:.2s ease;
      z-index:80;
      box-shadow:var(--shadow);
      font-size:13px;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="burger" id="burger" aria-label="menu">≡</div>
    <div class="title" id="pageTitle">的中入力</div>
    <div class="top-actions"></div>
  </div>

  <!-- Drawer -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="h">メニュー</div>
      <button class="drawer-close" id="drawerClose">×</button>
    </div>
    <div class="menu">
      <button id="m-record" class="active">🎯 的中入力</button>
      <button id="m-calendar">🗓️ カレンダー</button>
      <button id="m-stats">📒 的中率</button>
      <button id="m-form">🏹 射型</button>
      <div class="hint">
        ・ワンタップ：青 ○（的中）<br/>
        ・ダブルタップ：赤 ×（外れ）<br/>
        ・長押し：クリア（未入力）<br/>
        ・矢所：矢を押して「矢所」→①〜④
      </div>
    </div>
  </aside>

  <main id="main"></main>

  <!-- Bottom tabs -->
  <div class="bottomnav">
    <div class="tabs">
      <div class="tab active" id="t-record"><div class="ico">🎯</div>的中</div>
      <div class="tab" id="t-calendar"><div class="ico">🗓️</div>日付</div>
      <div class="tab" id="t-stats"><div class="ico">📒</div>的中率</div>
      <div class="tab" id="t-form"><div class="ico">🏹</div>射型</div>
    </div>
  </div>

  <!-- Location Modal -->
  <div class="modal-overlay" id="locOverlay">
    <div class="modal">
      <h3 id="locTitle">矢所を選択</h3>
      <div class="muted" style="font-size:13px;line-height:1.5">
        ①〜④をタップして記録します（その矢に紐づきます）。
      </div>
      <div class="grid">
        <button class="locbtn" data-loc="1">①</button>
        <button class="locbtn" data-loc="2">②</button>
        <button class="locbtn" data-loc="3">③</button>
        <button class="locbtn" data-loc="4">④</button>
      </div>
      <div class="foot">
        <button class="btn" id="locClear">矢所クリア</button>
        <button class="btn primary" id="locClose">閉じる</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">保存しました</div>
</div>

<script>
/** =========================
 *  Storage / Model
 *  ========================= */
const STORE_KEY = "kyudo_notebook_v2";
const FORM_KEY  = "kyudo_form_v1";

function loadAll(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch(e){ return {}; }
}
function saveAll(obj){
  localStorage.setItem(STORE_KEY, JSON.stringify(obj));
}
function defaultStand(){
  return { shots:[0,0,0,0], locs:[null,null,null,null], memo:"" };
}
function defaultDay(){
  return { goal:"", stands: Array.from({length:4}, ()=>defaultStand()) };
}
function getDay(all, key){
  if(!all[key]) all[key] = defaultDay();
  if(!all[key].stands || all[key].stands.length===0) all[key].stands = defaultDay().stands;
  // 補正：standのshapeが崩れてたら直す
  all[key].stands = all[key].stands.map(s=>({
    shots: Array.isArray(s?.shots) && s.shots.length===4 ? s.shots : [0,0,0,0],
    locs : Array.isArray(s?.locs)  && s.locs.length===4  ? s.locs  : [null,null,null,null],
    memo : typeof s?.memo === "string" ? s.memo : ""
  }));
  return all[key];
}
function loadForm(){
  try{
    const raw = localStorage.getItem(FORM_KEY);
    return raw ? JSON.parse(raw) : defaultForm();
  }catch(e){ return defaultForm(); }
}
function saveForm(obj){ localStorage.setItem(FORM_KEY, JSON.stringify(obj)); }
function defaultForm(){
  return {
    focus:"",
    eight:{
      "足踏み":"",
      "胴造り":"",
      "弓構え":"",
      "打起し":"",
      "引分け":"",
      "会":"",
      "離れ":"",
      "残心":""
    }
  };
}

function todayKey(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

/** =========================
 *  Router
 *  ========================= */
const main = document.getElementById("main");
const pageTitle = document.getElementById("pageTitle");

const Pages = { record:"record", calendar:"calendar", stats:"stats", form:"form" };
let currentPage = Pages.record;

function setActiveTabs(){
  const allTabs = ["t-record","t-calendar","t-stats","t-form"];
  const allMenu = ["m-record","m-calendar","m-stats","m-form"];
  allTabs.forEach(id=>document.getElementById(id).classList.remove("active"));
  allMenu.forEach(id=>document.getElementById(id).classList.remove("active"));

  const map = {
    record: ["t-record","m-record"],
    calendar:["t-calendar","m-calendar"],
    stats: ["t-stats","m-stats"],
    form:  ["t-form","m-form"]
  };
  map[currentPage].forEach(id=>document.getElementById(id).classList.add("active"));
}
function navigate(page){
  currentPage = page;
  closeDrawer();
  setActiveTabs();
  if(page===Pages.record){
    pageTitle.textContent = "的中入力";
    renderRecord();
  }else if(page===Pages.calendar){
    pageTitle.textContent = "カレンダー";
    renderCalendar();
  }else if(page===Pages.stats){
    pageTitle.textContent = "的中率";
    renderStats();
  }else{
    pageTitle.textContent = "射型";
    renderForm();
  }
}

/** =========================
 *  Drawer
 *  ========================= */
const drawer = document.getElementById("drawer");
const drawerOverlay = document.getElementById("drawerOverlay");
function openDrawer(){ drawer.classList.add("open"); drawerOverlay.classList.add("open"); }
function closeDrawer(){ drawer.classList.remove("open"); drawerOverlay.classList.remove("open"); }
document.getElementById("burger").addEventListener("click", openDrawer);
document.getElementById("drawerClose").addEventListener("click", closeDrawer);
drawerOverlay.addEventListener("click", closeDrawer);

/** nav hooks */
document.getElementById("m-record").addEventListener("click", ()=>navigate(Pages.record));
document.getElementById("m-calendar").addEventListener("click", ()=>navigate(Pages.calendar));
document.getElementById("m-stats").addEventListener("click", ()=>navigate(Pages.stats));
document.getElementById("m-form").addEventListener("click", ()=>navigate(Pages.form));

document.getElementById("t-record").addEventListener("click", ()=>navigate(Pages.record));
document.getElementById("t-calendar").addEventListener("click", ()=>navigate(Pages.calendar));
document.getElementById("t-stats").addEventListener("click", ()=>navigate(Pages.stats));
document.getElementById("t-form").addEventListener("click", ()=>navigate(Pages.form));

/** =========================
 *  Toast
 *  ========================= */
const toast = document.getElementById("toast");
let toastTimer = null;
function showToast(msg="保存しました"){
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toast.classList.remove("show"), 1100);
}

/** =========================
 *  Tap / double / long press
 *  ========================= */
function attachTapHandlers(el, {onTap, onDoubleTap, onLongPress}){
  let tapTimeout = null;
  let lastTap = 0;
  let pressTimer = null;
  let moved = false;

  const clearTimers = ()=>{
    if(tapTimeout){ clearTimeout(tapTimeout); tapTimeout=null; }
    if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; }
  };

  el.addEventListener("touchstart", ()=>{
    moved = false;
    pressTimer = setTimeout(()=>{
      onLongPress?.();
      clearTimers();
    }, 520);
  }, {passive:true});

  el.addEventListener("touchmove", ()=>{ moved = true; clearTimers(); }, {passive:true});
  el.addEventListener("touchend", ()=>{
    if(moved) return;
    if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; }
    const now = Date.now();
    const delta = now - lastTap;
    lastTap = now;

    if(delta > 0 && delta < 260){
      if(tapTimeout){ clearTimeout(tapTimeout); tapTimeout=null; }
      onDoubleTap?.();
    }else{
      tapTimeout = setTimeout(()=>{
        onTap?.();
        tapTimeout=null;
      }, 260);
    }
  }, {passive:true});

  // desktop
  el.addEventListener("click", ()=> onTap?.());
  el.addEventListener("dblclick", ()=> onDoubleTap?.());
  el.addEventListener("contextmenu", (e)=>{ e.preventDefault(); onLongPress?.(); });
}

/** =========================
 *  Location modal
 *  ========================= */
const locOverlay = document.getElementById("locOverlay");
const locTitle = document.getElementById("locTitle");
let locCtx = null; // {dateKey, standIdx, shotIdx}

function openLocModal(ctx){
  locCtx = ctx;
  locTitle.textContent = `矢所（${ctx.standIdx+1}立ち目 / ${ctx.shotIdx+1}射目）`;
  locOverlay.style.display = "flex";
}
function closeLocModal(){
  locOverlay.style.display = "none";
  locCtx = null;
}
document.getElementById("locClose").addEventListener("click", closeLocModal);
locOverlay.addEventListener("click", (e)=>{ if(e.target === locOverlay) closeLocModal(); });

document.querySelectorAll(".locbtn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    if(!locCtx) return;
    const all = loadAll();
    const day = getDay(all, locCtx.dateKey);
    day.stands[locCtx.standIdx].locs[locCtx.shotIdx] = Number(btn.dataset.loc);
    saveAll(all);
    showToast("矢所を保存");
    if(currentPage===Pages.record) renderRecord(locCtx.dateKey);
    closeLocModal();
  });
});
document.getElementById("locClear").addEventListener("click", ()=>{
  if(!locCtx) return;
  const all = loadAll();
  const day = getDay(all, locCtx.dateKey);
  day.stands[locCtx.standIdx].locs[locCtx.shotIdx] = null;
  saveAll(all);
  showToast("矢所をクリア");
  if(currentPage===Pages.record) renderRecord(locCtx.dateKey);
  closeLocModal();
});

/** =========================
 *  Record page
 *  ========================= */
function shotSymbol(state){ return state===1 ? "○" : state===2 ? "×" : "＋"; }
function shotClass(state){ return state===1 ? "shot hit" : state===2 ? "shot miss" : "shot empty"; }

function daySummary(day){
  let total=0, hit=0;
  day.stands.forEach(s=>{
    s.shots.forEach(st=>{
      if(st!==0){ total++; if(st===1) hit++; }
    });
  });
  const pct = total ? (hit/total*100) : 0;
  return {total, hit, pct};
}
function dayHasAnyInput(day){
  return day.stands.some(s=>s.shots.some(st=>st!==0));
}

let currentRecordKey = todayKey();

function renderRecord(forceKey){
  const all = loadAll();
  const key = forceKey || currentRecordKey || todayKey();
  currentRecordKey = key;
  const day = getDay(all, key);
  const sum = daySummary(day);

  main.innerHTML = `
    <div class="card">
      <div class="row">
        <div>
          <div class="label">日付</div>
          <input type="date" id="datePick" value="${key}">
        </div>
        <div style="flex:0.95">
          <div class="label">合計</div>
          <div class="pill" id="dayPill">${sum.total ? `${sum.total}射 ${sum.hit}中 ${sum.pct.toFixed(2)}%` : "未入力"}</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="row" style="align-items:flex-end">
        <div>
          <div class="label">今日の目標</div>
          <input type="text" id="goalInput" placeholder="例：会で伸び合いを止めない / 20射◯◯中" value="${escapeHtml(day.goal)}">
        </div>
        <div style="flex:0.7;text-align:right">
          <button class="btn primary" id="addStand">＋ 立ち追加</button>
        </div>
      </div>

      <div class="muted" style="font-size:12px;margin-top:8px;line-height:1.5">
        ※ 各矢：タップ＝○ / ダブルタップ＝× / 長押し＝クリア。<br/>
        ※ 矢所：矢所（1射目〜）ボタン → ①〜④
      </div>
    </div>

    ${day.stands.map((s,idx)=>standCardHtml(idx, s)).join("")}

    <div class="card">
      <div class="row" style="align-items:flex-end">
        <div>
          <div class="label">この日の操作</div>
          <div class="muted" style="font-size:13px;line-height:1.6">
            ・立ちは「＋立ち追加」で増やせます（無制限）<br/>
            ・データは端末保存（GitHub PagesでもOK）
          </div>
        </div>
        <div style="flex:0.8;text-align:right">
          <button class="btn danger" id="clearDay">この日を全消去</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById("datePick").addEventListener("change", (e)=>{
    const newKey = e.target.value;
    if(!newKey) return;
    renderRecord(newKey);
  });

  const goalInput = document.getElementById("goalInput");
  goalInput.addEventListener("input", ()=>{
    const all2 = loadAll();
    const d2 = getDay(all2, currentRecordKey);
    d2.goal = goalInput.value;
    saveAll(all2);
  });

  document.getElementById("addStand").addEventListener("click", ()=>{
    const all2 = loadAll();
    const d2 = getDay(all2, currentRecordKey);
    d2.stands.push(defaultStand());
    saveAll(all2);
    showToast("立ちを追加");
    renderRecord(currentRecordKey);
  });

  document.getElementById("clearDay").addEventListener("click", ()=>{
    if(!confirm("この日の記録を全て消します。OK？")) return;
    const all2 = loadAll();
    delete all2[currentRecordKey];
    saveAll(all2);
    showToast("削除しました");
    renderRecord(currentRecordKey);
  });

  // shot handlers
  document.querySelectorAll("[data-shot]").forEach(el=>{
    const [standIdx, shotIdx] = el.dataset.shot.split("-").map(Number);
    attachTapHandlers(el,{
      onTap: ()=>{
        const all2 = loadAll();
        const d2 = getDay(all2, currentRecordKey);
        const st = d2.stands[standIdx].shots[shotIdx];
        d2.stands[standIdx].shots[shotIdx] = (st===1 ? 0 : 1); // tap: hit toggle
        saveAll(all2);
        renderRecord(currentRecordKey);
      },
      onDoubleTap: ()=>{
        const all2 = loadAll();
        const d2 = getDay(all2, currentRecordKey);
        d2.stands[standIdx].shots[shotIdx] = 2;
        saveAll(all2);
        renderRecord(currentRecordKey);
      },
      onLongPress: ()=>{
        const all2 = loadAll();
        const d2 = getDay(all2, currentRecordKey);
        d2.stands[standIdx].shots[shotIdx] = 0;
        saveAll(all2);
        renderRecord(currentRecordKey);
      }
    });
  });

  // loc open
  document.querySelectorAll("[data-loc-open]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const [standIdx, shotIdx] = btn.dataset.locOpen.split("-").map(Number);
      openLocModal({dateKey: currentRecordKey, standIdx, shotIdx});
    });
  });

  // memo
  document.querySelectorAll("[data-memo]").forEach(area=>{
    const standIdx = Number(area.dataset.memo);
    area.addEventListener("input", ()=>{
      const all2 = loadAll();
      const d2 = getDay(all2, currentRecordKey);
      d2.stands[standIdx].memo = area.value;
      saveAll(all2);
    });
  });
}

function standCardHtml(standIdx, stand){
  const shots = stand.shots.map((st,i)=>{
    const loc = stand.locs[i];
    return `
      <div class="${shotClass(st)}" data-shot="${standIdx}-${i}">
        ${shotSymbol(st)}
        <div class="sub">${loc ? `矢所${loc}` : ""}</div>
      </div>
    `;
  }).join("");

  const locBtns = stand.shots.map((_,i)=>{
    return `<button class="btn" data-loc-open="${standIdx}-${i}">矢所（${i+1}射目）</button>`;
  }).join("");

  return `
    <div class="card">
      <div class="stand-head">
        <div class="stand-title">${standIdx+1}立ち目</div>
        <div class="stand-actions">
          <button class="btn" onclick="deleteStand(${standIdx})">削除</button>
          <button class="btn danger" onclick="clearStand(${standIdx})">立ちクリア</button>
        </div>
      </div>

      <div class="shots">${shots}</div>

      <div class="divider"></div>

      <div class="label">矢所（①〜④）</div>
      <div class="row" style="gap:8px">${locBtns}</div>
      <div class="muted" style="font-size:12px;margin-top:6px">矢所は「その矢」に紐づきます。</div>

      <div class="divider"></div>

      <div class="label">メモ（${standIdx+1}立ち目）</div>
      <textarea data-memo="${standIdx}" placeholder="例：引分けで右肩が上がる / 会で押し負け">${escapeHtml(stand.memo)}</textarea>
    </div>
  `;
}

window.clearStand = function(standIdx){
  const all = loadAll();
  const d = getDay(all, currentRecordKey);
  d.stands[standIdx] = defaultStand();
  saveAll(all);
  showToast("立ちをクリア");
  renderRecord(currentRecordKey);
};
window.deleteStand = function(standIdx){
  const all = loadAll();
  const d = getDay(all, currentRecordKey);
  if(d.stands.length<=1){
    alert("最後の1立ちは削除できません。");
    return;
  }
  if(!confirm(`${standIdx+1}立ち目を削除します。OK？`)) return;
  d.stands.splice(standIdx,1);
  saveAll(all);
  showToast("立ちを削除");
  renderRecord(currentRecordKey);
};

/** =========================
 *  Calendar page
 *  ========================= */
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-11

function renderCalendar(){
  const all = loadAll();
  const monthLabel = `${calYear}年 ${String(calMonth+1).padStart(2,"0")}月`;

  main.innerHTML = `
    <div class="card">
      <div class="cal-head">
        <button class="btn" id="calPrev">←</button>
        <div class="month">${monthLabel}</div>
        <button class="btn" id="calNext">→</button>
      </div>
      <div class="divider"></div>
      <div class="row" style="align-items:center">
        <button class="btn primary" id="calToday">今日</button>
        <div class="muted" style="font-size:12px;line-height:1.4">
          ●＝入力あり（○/×が1つ以上）<br/>
          日付をタップするとその日の的中入力へ移動
        </div>
      </div>
    </div>

    <div class="card">
      <div class="cal-grid" id="calGrid"></div>
    </div>
  `;

  document.getElementById("calPrev").onclick = ()=>{
    calMonth--;
    if(calMonth<0){ calMonth=11; calYear--; }
    renderCalendar();
  };
  document.getElementById("calNext").onclick = ()=>{
    calMonth++;
    if(calMonth>11){ calMonth=0; calYear++; }
    renderCalendar();
  };
  document.getElementById("calToday").onclick = ()=>{
    const t = new Date();
    calYear = t.getFullYear();
    calMonth = t.getMonth();
    renderCalendar();
  };

  const grid = document.getElementById("calGrid");
  const dow = ["日","月","火","水","木","金","土"];
  dow.forEach(d=>grid.insertAdjacentHTML("beforeend", `<div class="cal-dow">${d}</div>`));

  const first = new Date(calYear, calMonth, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  // 前月の埋め
  const prevMonthDays = new Date(calYear, calMonth, 0).getDate();
  for(let i=0;i<startDow;i++){
    const d = prevMonthDays - (startDow-1-i);
    grid.insertAdjacentHTML("beforeend", `<div class="cal-cell off"><div class="d">${d}</div><div class="mini"></div><div class="dot"></div></div>`);
  }

  const tKey = todayKey();

  for(let d=1; d<=daysInMonth; d++){
    const key = `${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const day = all[key] ? getDay(all, key) : null;
    const has = day ? dayHasAnyInput(day) : false;
    const sum = day ? daySummary(day) : {total:0,hit:0,pct:0};

    const cls = [
      "cal-cell",
      has ? "hasdata" : "",
      key===tKey ? "today" : ""
    ].join(" ").trim();

    const mini = has ? `${sum.hit}/${sum.total}` : "";
    grid.insertAdjacentHTML("beforeend", `
      <div class="${cls}" data-cal="${key}">
        <div class="d">${d}</div>
        <div class="mini">${mini}</div>
        <div class="dot"></div>
      </div>
    `);
  }

  // 残りマスを埋め（見た目を揃える）
  const totalCells = 7 /*dow*/ + startDow + daysInMonth;
  const remainder = totalCells % 7;
  const fill = remainder===0 ? 0 : (7 - remainder);
  for(let i=1;i<=fill;i++){
    grid.insertAdjacentHTML("beforeend", `<div class="cal-cell off"><div class="d">${i}</div><div class="mini"></div><div class="dot"></div></div>`);
  }

  document.querySelectorAll("[data-cal]").forEach(cell=>{
    cell.addEventListener("click", ()=>{
      const key = cell.dataset.cal;
      currentRecordKey = key;
      navigate(Pages.record);
      renderRecord(key);
    });
  });
}

/** =========================
 *  Stats page
 *  ========================= */
let statsMode = "month";

function renderStats(){
  const all = loadAll();
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth()+1;

  main.innerHTML = `
    <div class="card">
      <div class="seg">
        <button id="seg-month" class="${statsMode==='month'?'active':''}">月間</button>
        <button id="seg-year" class="${statsMode==='year'?'active':''}">年間</button>
        <button id="seg-all" class="${statsMode==='all'?'active':''}">総合</button>
      </div>
      <div class="muted" style="font-size:12px;margin-top:8px;line-height:1.5">
        ※ 「入力済み（○または×）」のみを射数として集計します。
      </div>
    </div>

    <div class="card">
      <div class="label">集計期間</div>
      <div class="row">
        <div class="pill" id="periodPill"></div>
        <div style="text-align:right" class="muted" id="periodHint"></div>
      </div>
    </div>

    <div class="card">
      <div class="label">率（総的中率 / 1〜4射目別）</div>
      <div class="stats-grid" id="statsGrid"></div>
    </div>

    <div class="card">
      <div class="label">グラフ（的中数 / 行射数）</div>
      <canvas id="bar"></canvas>
      <div class="muted" style="font-size:12px;margin-top:8px">※ 直近30件（期間内）を表示</div>
    </div>
  `;

  document.getElementById("seg-month").onclick = ()=>{statsMode="month"; renderStats();};
  document.getElementById("seg-year").onclick  = ()=>{statsMode="year";  renderStats();};
  document.getElementById("seg-all").onclick   = ()=>{statsMode="all";   renderStats();};

  const {days, label, hint} = filterDaysByMode(all, statsMode, y, m);
  document.getElementById("periodPill").textContent = label;
  document.getElementById("periodHint").textContent = hint;

  const agg = aggregate(days);
  renderStatGrid(agg);

  const dataPoints = days
    .slice()
    .sort((a,b)=>a.key.localeCompare(b.key))
    .slice(-30)
    .map(d=>{
      const sum = daySummary(d.day);
      return {key:d.key, total:sum.total, hit:sum.hit};
    });
  drawBarChart(document.getElementById("bar"), dataPoints);
}

function filterDaysByMode(all, mode, year, month){
  const entries = Object.entries(all).map(([key,day])=>({key,day:getDay(all,key)}));
  if(mode==="all"){
    return {days: entries, label:"総合（全期間）", hint:`${entries.length}日分`};
  }
  if(mode==="year"){
    const prefix = `${year}-`;
    const ds = entries.filter(e=>e.key.startsWith(prefix));
    return {days: ds, label:`年間（${year}年）`, hint:`${ds.length}日分`};
  }
  const mm = String(month).padStart(2,"0");
  const prefix = `${year}-${mm}-`;
  const ds = entries.filter(e=>e.key.startsWith(prefix));
  return {days: ds, label:`月間（${year}/${mm}）`, hint:`${ds.length}日分`};
}

function aggregate(days){
  let total=0, hit=0;
  const per = [
    {total:0, hit:0},
    {total:0, hit:0},
    {total:0, hit:0},
    {total:0, hit:0},
  ];
  days.forEach(({day})=>{
    day.stands.forEach(s=>{
      s.shots.forEach((st,i)=>{
        if(st!==0){
          total++; per[i].total++;
          if(st===1){ hit++; per[i].hit++; }
        }
      });
    });
  });
  return {total, hit, per};
}
function pct(h,t){ return t ? (h/t*100) : 0; }

function renderStatGrid(agg){
  const grid = document.getElementById("statsGrid");
  const lines = [];
  lines.push(statLine("総的中率", `${agg.hit}/${agg.total}`, `${pct(agg.hit,agg.total).toFixed(2)}%`));
  lines.push(statLine("1射目", `${agg.per[0].hit}/${agg.per[0].total}`, `${pct(agg.per[0].hit,agg.per[0].total).toFixed(2)}%`));
  lines.push(statLine("2射目", `${agg.per[1].hit}/${agg.per[1].total}`, `${pct(agg.per[1].hit,agg.per[1].total).toFixed(2)}%`));
  lines.push(statLine("3射目", `${agg.per[2].hit}/${agg.per[2].total}`, `${pct(agg.per[2].hit,agg.per[2].total).toFixed(2)}%`));
  lines.push(statLine("4射目", `${agg.per[3].hit}/${agg.per[3].total}`, `${pct(agg.per[3].hit,agg.per[3].total).toFixed(2)}%`));
  grid.innerHTML = lines.join("");
}
function statLine(name, frac, percent){
  return `
    <div class="statline">
      <div class="k">${name}</div>
      <div class="v"><small>${frac}</small><span>${percent}</span></div>
    </div>
  `;
}

function drawBarChart(canvas, points){
  const ctx = canvas.getContext("2d");
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.floor(rect.width * dpr);
  canvas.height = Math.floor(rect.height * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);

  const w = rect.width, h = rect.height;
  ctx.clearRect(0,0,w,h);

  const pad = {l:36, r:12, t:12, b:30};
  const innerW = w - pad.l - pad.r;
  const innerH = h - pad.t - pad.b;

  const maxVal = Math.max(1, ...points.map(p=>Math.max(p.total, p.hit)));

  ctx.strokeStyle = "#e5e7eb";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad.l, pad.t);
  ctx.lineTo(pad.l, pad.t + innerH);
  ctx.lineTo(pad.l + innerW, pad.t + innerH);
  ctx.stroke();

  ctx.fillStyle = "#6b7280";
  ctx.font = "12px system-ui";
  ctx.fillText(String(maxVal), 8, pad.t + 10);
  ctx.fillText("0", 16, pad.t + innerH + 4);

  const n = Math.max(1, points.length);
  const gap = 6;
  const groupW = innerW / n;
  const barW = Math.max(6, (groupW - gap) / 2);

  points.forEach((p, i)=>{
    const x0 = pad.l + i*groupW + gap/2;
    const yBase = pad.t + innerH;

    const ht = innerH * (p.hit / maxVal);
    const tt = innerH * (p.total / maxVal);

    ctx.fillStyle = "rgba(37,99,235,.85)";
    ctx.fillRect(x0, yBase - ht, barW, ht);

    ctx.fillStyle = "rgba(220,38,38,.75)";
    ctx.fillRect(x0 + barW + 3, yBase - tt, barW, tt);
  });

  if(points.length){
    const last = points[points.length-1].key.replaceAll("-","/");
    ctx.fillStyle = "#6b7280";
    ctx.font = "12px system-ui";
    ctx.fillText(last, pad.l + innerW/2 - 34, h - 10);
  }
}
